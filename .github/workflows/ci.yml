name: ci

# Runs on every PR targeting main. Each job rebuilds raylib 6.0 from source for
# its platform (the install dirs are gitignored), then builds openblocks:
#   - linux:   native gcc, dev (-O2) + release (-O3)
#   - windows: mingw-w64 cross-compile, x64 + x86
#   - mac:     clang universal binary, arm64 + x86_64
#   - android: NDK cross-compile, NativeActivity APK (arm64-v8a), uploaded
#   - web:     Emscripten WASM build (mobile touch UI + keyboard), uploaded
# Doc-only changes skip CI. Pushes to main do nothing; merges go through PRs.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.editorconfig'
      - 'LICENSE'
      - 'NOTICE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux (build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Install raylib build + runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libasound2-dev
      - name: Build raylib (Linux, static)
        run: ./scripts/build_raylib_linux.sh
      - name: Run unit tests
        run: make test
      - name: Build dev + release
        run: make all release

  windows:
    name: windows cross-compile (x64 + x86)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Install mingw-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            mingw-w64 mingw-w64-tools binutils-mingw-w64
      - name: Build raylib (mingw win64 + win32)
        run: ./scripts/build_raylib_windows.sh
      - name: Cross-compile Win64 + Win32
        run: make windows

  mac:
    name: macOS universal build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Build raylib (universal arm64 + x86_64)
        run: ./scripts/build_raylib_mac.sh
      - name: Build universal binary
        run: make mac

  android:
    name: android (NativeActivity APK)
    runs-on: ubuntu-22.04
    env:
      NDK_VERSION: "26.3.11579264"
      ANDROID_BUILD_TOOLS: "35.0.0"
      ANDROID_PLATFORM_VER: "35"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK + build-tools + platform
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "platforms;android-${ANDROID_PLATFORM_VER}"
          echo "ANDROID_NDK=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
      - name: Build raylib (Android, arm64-v8a static)
        run: ./scripts/build_raylib_android.sh
      - name: Build APK (sideload)
        run: |
          make android \
            ANDROID_BUILD_TOOLS="${ANDROID_BUILD_TOOLS}" \
            ANDROID_PLATFORM_VER="${ANDROID_PLATFORM_VER}"
      # Validate the Play packaging pipeline (aapt2 + bundletool) on every PR,
      # debug-signed. Proves the .aab builds without needing the real upload key;
      # the release job swaps in the upload keystore when the secret is set.
      - name: Build AAB (Play packaging check, debug-signed)
        run: |
          make android-play \
            ANDROID_BUILD_TOOLS="${ANDROID_BUILD_TOOLS}" \
            ANDROID_PLATFORM_VER="${ANDROID_PLATFORM_VER}"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: openblocks-apk
          path: build/openblocks.apk

  web:
    name: web (WASM via Emscripten)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
      - name: Build raylib (web)
        run: ./scripts/build_raylib_web.sh
      - name: Build WASM
        run: make web
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: openblocks-web
          path: build/web
